<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="editor.css">
    <script src="markdown-it.min.js"></script>
    <script src="turndown.min.js"></script>
    <style>
        #editor {
            cursor: text;
        }
        #editor:focus {
            outline: none;
        }
        #editor:empty::before {
            content: "Start typing...";
            color: var(--fg-secondary);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div id="editor" contenteditable="true" spellcheck="true"></div>
    <script>
        const md = window.markdownit({
            html: true,
            linkify: true,
            typographer: true,
            breaks: false
        });

        const turndownService = new TurndownService({
            headingStyle: 'atx',
            codeBlockStyle: 'fenced',
            emDelimiter: '*',
            bulletListMarker: '-',
            hr: '---'
        });

        // Improve turndown handling of code blocks
        turndownService.addRule('fencedCodeBlock', {
            filter: function (node) {
                return node.nodeName === 'PRE' && node.querySelector('code');
            },
            replacement: function (content, node) {
                const code = node.querySelector('code');
                const className = code.getAttribute('class') || '';
                const lang = className.replace('language-', '');
                const text = code.textContent;
                return '\n\n```' + lang + '\n' + text + '\n```\n\n';
            }
        });

        // Handle strikethrough
        turndownService.addRule('strikethrough', {
            filter: ['del', 's', 'strike'],
            replacement: function (content) {
                return '~~' + content + '~~';
            }
        });

        // Handle task list checkboxes
        turndownService.addRule('taskList', {
            filter: function (node) {
                return node.nodeName === 'LI' && node.querySelector('input[type="checkbox"]');
            },
            replacement: function (content, node) {
                const checkbox = node.querySelector('input[type="checkbox"]');
                const checked = checkbox && checkbox.checked ? '[x]' : '[ ]';
                const text = content.replace(/^\s*\[[ x]\]\s*/, '').trim();
                return checked + ' ' + text + '\n';
            }
        });

        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        const editor = document.getElementById('editor');
        let debounceTimer = null;
        let isLoadingMarkdown = false;
        // Per-document caret offset cache so we can restore the cursor when the user
        // switches back to a tab they were editing in.
        const caretByDocId = new Map();
        let currentDocId = null;

        function getCaretOffset() {
            const sel = window.getSelection();
            if (!sel || sel.rangeCount === 0) return null;
            const range = sel.getRangeAt(0);
            // Only meaningful if the selection is inside the editor.
            if (!editor.contains(range.endContainer)) return null;
            const pre = range.cloneRange();
            pre.selectNodeContents(editor);
            pre.setEnd(range.endContainer, range.endOffset);
            return pre.toString().length;
        }

        function setCaretOffset(offset) {
            if (offset == null) return;
            const walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT, null);
            let charCount = 0;
            let node;
            while ((node = walker.nextNode())) {
                const len = node.length;
                if (offset <= charCount + len) {
                    const range = document.createRange();
                    range.setStart(node, offset - charCount);
                    range.collapse(true);
                    const sel = window.getSelection();
                    sel.removeAllRanges();
                    sel.addRange(range);
                    return;
                }
                charCount += len;
            }
            // Offset past the end — place at the end.
            const range = document.createRange();
            range.selectNodeContents(editor);
            range.collapse(false);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
        }

        function loadMarkdown(src, docId) {
            isLoadingMarkdown = true;
            // Cancel any pending debounced notifyChange so it can't fire AFTER this load
            // and post stale (pre-tab-switch) content to Swift, which would write it into
            // the newly-selected document and corrupt it.
            if (debounceTimer) {
                clearTimeout(debounceTimer);
                debounceTimer = null;
            }
            // Save the caret of the doc we're leaving so we can restore on return.
            if (currentDocId && currentDocId !== docId) {
                const off = getCaretOffset();
                if (off != null) caretByDocId.set(currentDocId, off);
            }
            editor.innerHTML = md.render(src || '');
            currentDocId = docId || currentDocId;
            isLoadingMarkdown = false;
            // Restore caret if we have one for this doc; otherwise leave the editor
            // unfocused so the cursor doesn't flash at the top-left of fresh content.
            if (docId && caretByDocId.has(docId)) {
                editor.focus();
                setCaretOffset(caretByDocId.get(docId));
            } else {
                editor.blur();
            }
        }

        // Continuously remember caret position for the current doc as the user moves it,
        // so restoration is up-to-date when they tab away.
        document.addEventListener('selectionchange', function () {
            if (isLoadingMarkdown || !currentDocId) return;
            const off = getCaretOffset();
            if (off != null) caretByDocId.set(currentDocId, off);
        });

        function getMarkdown() {
            return turndownService.turndown(editor.innerHTML);
        }

        // ----- Find & Replace (shared pattern with preview.html) -----

        function findRoot() { return editor; }

        function clearFind() {
            editor.querySelectorAll('.marky-find-match').forEach(function (span) {
                const parent = span.parentNode;
                const text = document.createTextNode(span.textContent);
                parent.replaceChild(text, span);
                parent.normalize();
            });
        }

        function findAll(query, caseSensitive) {
            clearFind();
            if (!query) return 0;

            const walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT, {
                acceptNode: function (n) {
                    const tag = n.parentNode && n.parentNode.tagName;
                    if (tag === 'SCRIPT' || tag === 'STYLE') return NodeFilter.FILTER_REJECT;
                    return NodeFilter.FILTER_ACCEPT;
                }
            });
            const textNodes = [];
            let cur;
            while ((cur = walker.nextNode())) textNodes.push(cur);

            const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const flags = 'g' + (caseSensitive ? '' : 'i');
            const re = new RegExp(escaped, flags);

            let count = 0;
            textNodes.forEach(function (node) {
                const text = node.nodeValue;
                if (!text) return;
                re.lastIndex = 0;
                let m, last = 0;
                const frag = document.createDocumentFragment();
                let matched = false;
                while ((m = re.exec(text)) !== null) {
                    matched = true;
                    if (m.index > last) {
                        frag.appendChild(document.createTextNode(text.slice(last, m.index)));
                    }
                    const span = document.createElement('span');
                    span.className = 'marky-find-match';
                    span.textContent = m[0];
                    frag.appendChild(span);
                    last = m.index + m[0].length;
                    count++;
                    if (m[0].length === 0) re.lastIndex++;
                }
                if (matched) {
                    if (last < text.length) {
                        frag.appendChild(document.createTextNode(text.slice(last)));
                    }
                    node.parentNode.replaceChild(frag, node);
                }
            });
            return count;
        }

        function jumpToMatch(index) {
            editor.querySelectorAll('.marky-find-current').forEach(function (el) {
                el.classList.remove('marky-find-current');
            });
            const matches = editor.querySelectorAll('.marky-find-match');
            if (index < 0 || index >= matches.length) return;
            const target = matches[index];
            target.classList.add('marky-find-current');
            target.scrollIntoView({ block: 'center', behavior: 'smooth' });
        }

        // Replace the currently highlighted match with `replacement`. Returns true on success.
        function replaceCurrent(replacement) {
            const target = editor.querySelector('.marky-find-current');
            if (!target) return false;
            // Substitute a plain text node — preserves undo stack via execCommand? No —
            // direct DOM mutation here. We accept that this replace step isn't part of
            // the browser undo stack (rare case: user wants to undo a Replace All in WYSIWYG).
            const parent = target.parentNode;
            parent.replaceChild(document.createTextNode(replacement), target);
            parent.normalize();
            notifyChange();
            return true;
        }

        // Replace all matches of `query` with `replacement`. Operates on raw text nodes
        // so it doesn't depend on prior findAll having run.
        function replaceAll(query, replacement, caseSensitive) {
            if (!query) return 0;
            clearFind();

            const walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT, {
                acceptNode: function (n) {
                    const tag = n.parentNode && n.parentNode.tagName;
                    if (tag === 'SCRIPT' || tag === 'STYLE') return NodeFilter.FILTER_REJECT;
                    return NodeFilter.FILTER_ACCEPT;
                }
            });
            const textNodes = [];
            let cur;
            while ((cur = walker.nextNode())) textNodes.push(cur);

            const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const flags = 'g' + (caseSensitive ? '' : 'i');
            const re = new RegExp(escaped, flags);

            let count = 0;
            textNodes.forEach(function (node) {
                const text = node.nodeValue;
                if (!text) return;
                re.lastIndex = 0;
                if (!re.test(text)) return;
                re.lastIndex = 0;
                const replaced = text.replace(re, function () { count++; return replacement; });
                node.nodeValue = replaced;
            });
            if (count > 0) notifyChange();
            return count;
        }

        function insertFormatting(type) {
            // Ensure focus is on the editor before applying formatting
            editor.focus();

            switch (type) {
                case 'bold':
                    document.execCommand('bold', false, null);
                    break;
                case 'italic':
                    document.execCommand('italic', false, null);
                    break;
                case 'strikethrough':
                    document.execCommand('strikeThrough', false, null);
                    break;
                case 'code': {
                    const sel = window.getSelection();
                    if (sel.rangeCount > 0) {
                        const range = sel.getRangeAt(0);
                        if (range.collapsed) {
                            // No selection — insert a code element via execCommand so undo works
                            document.execCommand('insertHTML', false, '<code>\u200B</code>');
                        } else {
                            // Wrap selection in <code> using execCommand for undo support
                            const selectedText = range.toString();
                            document.execCommand('insertHTML', false, '<code>' + escapeHTML(selectedText) + '</code>');
                        }
                    }
                    break;
                }
                case 'h1':
                case 'h2':
                case 'h3':
                case 'h4': {
                    const level = type.charAt(1);
                    document.execCommand('formatBlock', false, '<h' + level + '>');
                    break;
                }
                case 'ul':
                    document.execCommand('insertUnorderedList', false, null);
                    break;
                case 'ol':
                    document.execCommand('insertOrderedList', false, null);
                    break;
                case 'blockquote':
                    document.execCommand('formatBlock', false, '<blockquote>');
                    break;
                case 'hr':
                    document.execCommand('insertHorizontalRule', false, null);
                    break;
                case 'link': {
                    // Fallback if called directly from JS (toolbar uses insertLink instead)
                    const url = prompt('Enter URL:');
                    if (url) {
                        document.execCommand('createLink', false, url);
                    }
                    break;
                }
                case 'paragraph':
                    document.execCommand('formatBlock', false, '<p>');
                    break;
            }
            notifyChange();
        }

        function insertLink(url, text) {
            editor.focus();
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                if (!range.collapsed) {
                    document.execCommand('createLink', false, url);
                } else {
                    var displayText = escapeHTML(text || url);
                    var safeURL = escapeHTML(url);
                    document.execCommand('insertHTML', false, '<a href="' + safeURL + '">' + displayText + '</a>');
                }
            }
            notifyChange();
        }

        function notifyChange() {
            if (isLoadingMarkdown) return;
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(function () {
                const markdown = getMarkdown();
                window.webkit.messageHandlers.editor.postMessage({
                    type: 'contentChanged',
                    markdown: markdown
                });
            }, 300);
        }

        editor.addEventListener('input', notifyChange);

        // Keyboard shortcuts — must preventDefault for all to stop macOS/SwiftUI from intercepting
        document.addEventListener('keydown', function (e) {
            if (!e.metaKey) return;

            if (e.shiftKey) {
                switch (e.key) {
                    case '7':
                        e.preventDefault();
                        insertFormatting('ol');
                        return;
                    case '8':
                        e.preventDefault();
                        insertFormatting('ul');
                        return;
                    case '9':
                        e.preventDefault();
                        insertFormatting('blockquote');
                        return;
                }
            }

            switch (e.key) {
                case 'b':
                    e.preventDefault();
                    insertFormatting('bold');
                    break;
                case 'i':
                    e.preventDefault();
                    insertFormatting('italic');
                    break;
                case 'k':
                    e.preventDefault();
                    window.webkit.messageHandlers.editor.postMessage({
                        type: 'requestLink'
                    });
                    break;
                case 'e':
                    e.preventDefault();
                    insertFormatting('code');
                    break;
                case 'd':
                    e.preventDefault();
                    insertFormatting('strikethrough');
                    break;
                case 'z':
                    // Intercept undo/redo to keep it within the WebView's own undo stack
                    // Prevents macOS NSUndoManager from crashing on stale references
                    e.preventDefault();
                    if (e.shiftKey) {
                        document.execCommand('redo', false, null);
                    } else {
                        document.execCommand('undo', false, null);
                    }
                    notifyChange();
                    break;
            }
        }, true); // useCapture=true to intercept before contentEditable

        // Don't auto-focus — avoids a stray blinking cursor on load
    </script>
</body>
</html>
